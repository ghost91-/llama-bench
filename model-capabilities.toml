# Capability priors by models.toml group.
# Scale: 0 = none, 1 = weak, 2 = usable, 3 = good, 4 = strong, 5 = excellent.
# These are model-family priors from public benchmark/model-card research, not local speed scores.
# Rubric anchors:
# - coding: SWE-Bench/Terminal/Aider first, LiveCodeBench/Codeforces second.
# - reasoning: AIME, GPQA, HLE, MMLU-Pro, BigBench-style hard reasoning.
# - tools: Tau/tau2, BFCL, MCP/tool benchmarks, function calling/JSON support.
# - vision: multimodal + OCR/document evidence: MMMU, OCRBench, OmniDocBench, ScreenSpot.
# - writing: general chat/prose/summarisation prior from model family and instruction quality.
# - multilingual: MMMLU/WMT/language coverage evidence.

